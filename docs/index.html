<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WHOOP Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #07090f;
      color: #e8eef8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .sub {
      color: #7b8798;
      font-size: 14px;
      margin: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .card {
      background: #0d1120;
      border: 1px solid #161f36;
      border-radius: 16px;
      padding: 16px;
    }
    .label {
      color: #718096;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 10px;
    }
    .value {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
    }
    .unit {
      font-size: 12px;
      color: #718096;
      margin-left: 4px;
    }
    .section {
      background: #0d1120;
      border: 1px solid #161f36;
      border-radius: 16px;
      padding: 18px 16px;
      margin-bottom: 16px;
    }
    .section h2 {
      margin: 0 0 14px;
      font-size: 15px;
      color: #aab6c8;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid #161f36;
    }
